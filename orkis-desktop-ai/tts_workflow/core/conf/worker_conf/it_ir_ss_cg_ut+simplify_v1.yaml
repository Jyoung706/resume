# 정의서 : ./tts_workflow/docu/config_information.md
# [CHECK] edges 설정에서 'start'와 'end' 를 명시 해도 동작하도록 바꾸고 싶어..
root_import_path: 'tts_workflow.app.worker'
works:
  intent_classifier:
    import_path: 'intent_classifier.IntentClassifier'
    streaming: false
    args:
      template_name: 'intent_classifier'
      parser_name: 'str_output_parser'
      engine_config:
        temperature: 0.2
  general_llm:
    import_path: 'general_llm.GeneralLLM'
    args:
      template_name: 'general_llm'
      parser_name: 'str_output_parser'
      engine_config:
        temperature: 0.8
      limit_characters: 5000
      language: 'Korean'
      assistant_name: 'Orkis Assistant'
      
  # information_retriever agents
  extract_keywords:
    import_path: 'extract_keywords.ExtractKeywords'
    args:
      template_name: 'extract_keywords'
      parser_name: 'python_list_output_parser'
      engine_config:
        temperature: 0.2
  retrieve_entity:
    import_path: 'retrieve_entity.RetrieveEntity'
    args: {}
  retrieve_context:
    import_path: 'retrieve_context.RetrieveContext'
    args:
      top_k: 5

  # schema_selector agents
  # filter_column:
  #   import_path: 'filter_column.FilterColumn'
  #   args:
  #     template_name: 'filter_column'
  #     parser_name: 'filter_column'
  #     engine_config:
  #       temperature: 0.0
  select_tables:
    import_path: 'select_tables.SelectTables'
    args:
      template_name: 'select_tables'
      parser_name: 'select_tables'
      engine_config:
        temperature: 0.0
  select_columns:
    import_path: 'select_columns.SelectColumns'
    args:
      template_name: 'select_columns'
      parser_name: 'select_columns'
      engine_config:
        temperature: 0.0

  # candidate_generator agents
  generate_candidate:
    import_path: 'generate_candidate.GenerateCandidate'
    args:
      generator_configs:
        - template_name: 'generate_candidate_one'
          parser_name: 'generate_candidate_gemini_markdown_cot'
          engine_config:
            temperature: 0.01
          sampling_count: 1
  revise:
    import_path: 'revise.Revise'
    args:
      template_name: 'revise_one'
      parser_name: 'revise_new'
      engine_config:
        temperature: 0.0

  # unit tester agents
  generate_unit_test:
    import_path: 'generate_unit_test.GenerateUnitTest'
    args:
      template_name: 'generate_unit_tests'
      parser_name: 'generate_unit_tests'
      engine_config:
        temperature: 0.8
      unit_test_count: 20
      sampling_count: 1
  evaluate:
    import_path: 'evaluate.Evaluate'
    args:
      template_name: 'evaluate'
      parser_name: 'evaluate'
      engine_config:
        temperature: 0.8
  
  # final work (must be defined)
  final:
    import_path: 'final_work.Final'
    args: {}

edges:
  - type: 'conditional'
    src: 'intent_classifier'
    dsts:
      tts_step: 'extract_keywords'
      general_step: 'general_llm'
      none_step:
  - type: 'normal'
    src: 'extract_keywords'
    dst: 'retrieve_entity'
  - type: 'normal'
    src: 'extract_keywords'
    dst: 'retrieve_context'
  - type: 'normal'
    src: 'retrieve_entity'
    dst: 'select_tables'
  - type: 'normal'
    src: 'retrieve_context'
    dst: 'select_tables'
  - type: 'normal'
    src: 'select_tables'
    dst: 'select_columns'
  - type: 'normal'
    src: 'select_columns'
    dst: 'generate_candidate'
  - type: 'normal'
    src: 'generate_candidate'
    dst: 'revise'
  - type: 'normal'
    src: 'revise'
    dst: 'generate_unit_test'
  - type: 'normal'
    src: 'generate_unit_test'
    dst: 'evaluate'

procs:
  - process_id: 'generate_hint'
    works:
      - extract_keywords
      - retrieve_entity
      - retrieve_context
  - process_id: 'schema_linking'
    works:
      - select_tables
      - select_columns
  - process_id: 'generate_sql'
    works:
      - generate_candidate
      - revise
  - process_id: 'evaluate'
    works:
      - generate_unit_test
      - evaluate
      - final