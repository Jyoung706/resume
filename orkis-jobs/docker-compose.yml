services:
  orkis-jobs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orkis-jobs-dev
    volumes:
      # 소스코드 마운트 (실시간 반영)
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      # .env 파일 마운트
      - ./.env:/app/.env
      # node_modules는 컨테이너 것 사용 (성능 최적화)
      - /app/node_modules
      - /app/.yarn
      - /app/.yalc
    environment:
      - NODE_ENV=development
      # .env 파일을 사용하되, 필요시 여기서 오버라이드 가능
    env_file:
      - .env
    ports:
      - "3002:3002"
      - "9229:9229" # 디버그 포트
    # host.docker.internal을 통해 호스트의 Redis에 접근
    extra_hosts:
      - "host.docker.internal:host-gateway"
