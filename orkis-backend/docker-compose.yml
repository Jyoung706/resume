services:
  orkis-backend:
    build:
      context: .
      dockerfile: dev.Dockerfile
    container_name: orkis-backend-dev
    ports:
      - "8080:8080" # HTTP API
      - "8081:8081" # WebSocket
      - "9229:9229"
    volumes:
      # 소스코드 마운트 (실시간 반영)
      - ./src:/app/src
      - ./resources:/app/resources
      - ./share:/app/share
      # node_modules는 제외 (컨테이너 내부 것 사용)
      - /app/node_modules
    env_file: ./resources/dev.env
    environment:
      - WS_PORT=8081
    restart: unless-stopped
