resolver kube-dns.kube-system.svc.cluster.local valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream orkis-backend {
    server orkis-backend.orkis.svc.cluster.local:80;
    keepalive 32;
}

server {
    listen 5173;
    server_name localhost;

    # 루트 디렉토리 설정
    root /usr/share/nginx/html;
    index index.html;

    # gzip 압축 활성화
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # Phase 1 D16/D17 - 대량 export 전용 location (exact match).
    # 거대 SELECT 의 첫 row lag 가 5분을 초과해도 nginx 가 끊지 않도록 timeout 30분.
    # 다운로드 파일은 디스크에 decoded 저장되므로 wire 압축 가치 낮음 - gzip off.
    # nginx location 매칭 우선순위상 exact match 가 prefix /api/ 보다 먼저 적용됨.
    # 참조: docs/2026-06-01/bulk-download-streaming-plan.md (D16, D17, K1, K11)
    # ============================================================
    location = /api/query/export {
        proxy_pass http://orkis-backend/query/export;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;

        proxy_buffering off;
        gzip off;
    }

    location = /api/query/validate-for-export {
        proxy_pass http://orkis-backend/query/validate-for-export;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        # validate-for-export 는 짧은 prepare/finalize 만 - 60s 충분.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        gzip off;
    }

    # API 프록시 설정 (SSE 포함)
    location /api/ {
        proxy_pass http://orkis-backend/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 인증 정보 전달 (필수)
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        # 타임아웃 설정 (SSE는 장시간 유지)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # SSE를 위한 버퍼링 비활성화
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # SPA 라우팅 - 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health.html {
        access_log off;
        return 200 'healthy\n';
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
