services:
  orkis-front:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: orkis-front-dev
    ports:
      - "5173:5173"  # Vite 개발 서버 포트
    networks:
      - orkis_orkis-network
    volumes:
      # 소스코드 마운트 (실시간 반영)
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./index.html:/app/index.html
      # node_modules는 제외 (컨테이너 내부 것 사용)
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true  # Windows 파일 감시 개선
      - VITE_API_URL=http://orkis-backend-dev:8080  # Backend 서비스 URL
    command: yarn dev --host 0.0.0.0  # 모든 IP에서 접근 가능
    restart: unless-stopped

networks:
  orkis_orkis-network:
    external: true