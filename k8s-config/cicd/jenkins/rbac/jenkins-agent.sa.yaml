# Jenkins Agent ServiceAccount
# 빌드 시 동적으로 생성되는 agent Pod이 사용
# 실제 권한은 jenkins-deployer.rbac.yaml 의 cross-namespace RoleBinding 으로 부여됨
# (cicd 안에서는 별도 권한 없이 빌드 실행만, orkis 안에서는 deployment/service 조작)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-agent
  namespace: cicd
  labels:
    app: jenkins
    component: agent
