# Jenkins Controller RBAC
# Jenkins controller Pod이 cicd 네임스페이스 안에서
# agent pod을 동적으로 생성/관리할 권한
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-controller
  namespace: cicd
  labels:
    app: jenkins
    component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-controller
  namespace: cicd
  labels:
    app: jenkins
    component: controller
rules:
  # agent pod 생성/관리
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # workspace PVC, 설정 ConfigMap 사용
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch"]
  # secret 참조 (image pull, credentials 등)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Kubernetes Plugin이 endpoint/event 조회
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-controller
  namespace: cicd
  labels:
    app: jenkins
    component: controller
subjects:
  - kind: ServiceAccount
    name: jenkins-controller
    namespace: cicd
roleRef:
  kind: Role
  name: jenkins-controller
  apiGroup: rbac.authorization.k8s.io
