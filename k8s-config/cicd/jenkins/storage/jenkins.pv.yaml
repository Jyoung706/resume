# Jenkins home - NAS NFS 정적 PV (기존 NAS 디렉토리 그대로 사용)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jenkins-home-pv
  labels:
    app: jenkins
spec:
  capacity:
    storage: 25Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  nfs:
    server: 172.25.1.129
    path: /share_ee5038c0_4304_4915_a277_a5ea082e01f1/cicd-jenkins-home-nfs-pvc
  claimRef:
    namespace: cicd
    name: jenkins-home-nfs-pvc
