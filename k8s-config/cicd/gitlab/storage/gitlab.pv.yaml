# GitLab PV - ManagedKS: KT Cloud 데이터 볼륨 100Gi (/dev/vdb → /mnt/gitlab)
# 디스크 한 장을 4개 하위 디렉토리로 분리 사용
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-config-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/gitlab/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - "gitlab"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-data-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/gitlab/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - "gitlab"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-log-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/gitlab/log
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - "gitlab"
---
# GitLab backup은 NAS NFS 마운트 (기존 NAS의 기존 디렉토리 그대로 사용)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitlab-backup-pv
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  nfs:
    server: 172.25.1.129
    path: /share_ee5038c0_4304_4915_a277_a5ea082e01f1/cicd-gitlab-backup-pvc
  claimRef:
    namespace: cicd
    name: gitlab-backup-pvc
