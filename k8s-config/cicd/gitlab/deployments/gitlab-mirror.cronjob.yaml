---
# GitLab 소스코드 미러 백업 CronJob
# - 매일 03:00 KST: 전체 프로젝트 fetch (증분 git remote update --prune, 새 프로젝트는 git clone --mirror)
# - 일요일 추가: 미러 디렉토리 전체를 mirror-<YYYY-MM-DD>.tar.gz 스냅샷 생성, 30일 초과 스냅샷 삭제
#
# 복원: 미러 디렉토리의 <project>.git 에서 git push --mirror <new-remote> 로 임의 git 호스트에 복원 가능 (Gitea/GitLab/생짜 git 무관)
#
# 사전 준비:
#   1. NAS share 안에 cicd-gitlab-mirror-pvc 디렉토리 생성 (worker002의 /mnt/nas-rw 활용)
#   2. GitLab admin PAT 발급 (scopes: read_api, read_repository) 후 아래 Secret 적용
#      kubectl -n cicd create secret generic gitlab-mirror-token \
#        --from-literal=token=<GLPAT-...>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-mirror-script
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
    purpose: source-mirror
data:
  run.sh: |
    #!/bin/sh
    set -eu

    : "${GITLAB_HOST:?missing}"
    : "${GITLAB_TOKEN:?missing}"

    MIRROR_DIR=/mirror/repos
    SNAPSHOT_DIR=/mirror/snapshots
    SNAPSHOT_RETENTION_DAYS=30

    mkdir -p "$MIRROR_DIR" "$SNAPSHOT_DIR"

    log() { echo "[$(date -Iseconds)] $*"; }

    log "0/3 도구/접속 확인"
    git --version
    curl -sf -o /dev/null \
      --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
      "https://${GITLAB_HOST}/api/v4/version" \
      && echo "GitLab API OK" || { echo "GitLab API 인증 실패"; exit 1; }

    log "1/3 프로젝트 목록 페이지네이션"
    PAGE=1
    TOTAL=0
    : > /tmp/projects.tsv
    while :; do
      RESP=$(curl -sf \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "https://${GITLAB_HOST}/api/v4/projects?membership=false&simple=true&per_page=100&page=${PAGE}&order_by=id&sort=asc")
      COUNT=$(echo "$RESP" | jq 'length')
      if [ "$COUNT" -eq 0 ]; then break; fi
      echo "$RESP" | jq -r '.[] | .path_with_namespace' >> /tmp/projects.tsv
      TOTAL=$((TOTAL + COUNT))
      PAGE=$((PAGE + 1))
    done
    log "프로젝트 ${TOTAL} 개"

    # GitLab smart HTTP 인증: URL 에 oauth2:TOKEN basic-auth 박아 git fetch 직접 호출
    # 디스크의 origin URL 에는 토큰 박지 않아 NAS 백업/공유 시 토큰 노출 최소화
    log "2/3 fetch / clone --mirror"
    OK=0
    NG=0
    while IFS= read -r PATH_NS; do
      [ -z "$PATH_NS" ] && continue
      DEST="${MIRROR_DIR}/${PATH_NS}.git"
      CLEAN_URL="https://${GITLAB_HOST}/${PATH_NS}.git"
      AUTH_URL="https://oauth2:${GITLAB_TOKEN}@${GITLAB_HOST}/${PATH_NS}.git"
      mkdir -p "$(dirname "$DEST")"
      if [ -d "$DEST" ]; then
        if git -C "$DEST" fetch --prune --quiet "$AUTH_URL" "+refs/*:refs/*" 2>/dev/null; then
          OK=$((OK + 1))
        else
          echo "  FAIL update: $PATH_NS"
          NG=$((NG + 1))
        fi
      else
        if git clone --mirror --quiet "$AUTH_URL" "$DEST" 2>/dev/null; then
          git -C "$DEST" remote set-url origin "$CLEAN_URL"
          OK=$((OK + 1))
        else
          echo "  FAIL clone: $PATH_NS"
          NG=$((NG + 1))
        fi
      fi
    done < /tmp/projects.tsv
    log "fetch 완료: OK=${OK} NG=${NG}"

    DOW=$(date +%u)   # 1=월 ~ 7=일
    if [ "$DOW" = "7" ]; then
      log "3/3 (일요일) 스냅샷 생성"
      STAMP=$(date +%Y-%m-%d)
      SNAP="${SNAPSHOT_DIR}/mirror-${STAMP}.tar.gz"
      tar -C "$MIRROR_DIR" -czf "$SNAP" .
      log "스냅샷: $(ls -lh $SNAP | awk '{print $5, $9}')"

      log "${SNAPSHOT_RETENTION_DAYS}일 초과 스냅샷 삭제"
      find "$SNAPSHOT_DIR" -maxdepth 1 -type f -name 'mirror-*.tar.gz' \
        -mtime +${SNAPSHOT_RETENTION_DAYS} -print -delete
    else
      log "3/3 (평일) 스냅샷 건너뜀 (요일=${DOW})"
    fi

    log "최종 상태"
    du -sh "$MIRROR_DIR" "$SNAPSHOT_DIR" 2>/dev/null || true
    ls -1 "$SNAPSHOT_DIR" 2>/dev/null | tail -10 || true
    log "DONE"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitlab-mirror-backup
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
    purpose: source-mirror
spec:
  # 매일 03:00 KST (일요일이면 스크립트 내부에서 스냅샷까지 자동 생성)
  schedule: "0 3 * * *"
  timeZone: Asia/Seoul
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            workload: cicd
            app: gitlab-mirror-backup
        spec:
          restartPolicy: Never
          containers:
            - name: mirror
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache git curl jq ca-certificates >/dev/null
                  exec /bin/sh /scripts/run.sh
              env:
                - name: GITLAB_HOST
                  value: "git.orkis.kr"
                - name: GITLAB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: gitlab-mirror-token
                      key: token
              resources:
                requests: { cpu: "100m", memory: "128Mi" }
                limits:   { cpu: "1",    memory: "1Gi" }
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: mirror
                  mountPath: /mirror
          volumes:
            - name: script
              configMap:
                name: gitlab-mirror-script
                defaultMode: 0755
            - name: mirror
              persistentVolumeClaim:
                claimName: gitlab-mirror-pvc
