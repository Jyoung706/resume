---
# GitLab 전체 백업 CronJob - 분기 1회 (3개월)
# - DB, registry, settings, uploads, pages, lfs, artifacts, repositories 등 GitLab 종속 자원 일체
# - 무거움 (~12G/회). 소스코드 미러 백업은 별도 CronJob (gitlab-mirror-backup) 참고
#
# 복원 대상: GitLab 자체가 망가져 같은 GitLab 버전으로 환원해야 할 때만 사용
# 소스코드만 필요하면 [[mirror 백업 디렉토리]]에서 git push --mirror 로 더 빠른 복원 가능
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-backup
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-backup
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-backup
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
subjects:
  - kind: ServiceAccount
    name: gitlab-backup
    namespace: cicd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-backup
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-backup-script
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
data:
  run.sh: |
    #!/bin/sh
    set -eu

    NS=cicd
    DEPLOY=deploy/gitlab
    BACKUP_DIR=/var/opt/gitlab/backups

    # 분기 1회 풀백업이라 빠른 압축 - 90일 지난 tar는 gzip, 365일 지난 gz 삭제
    COMPRESS_AFTER_DAYS=90
    RETENTION_DAYS=365

    log() { echo "[$(date -Iseconds)] $*"; }

    log "1/3 gitlab-backup create 시작"
    kubectl -n "$NS" exec "$DEPLOY" -- \
      gitlab-backup create CRON=1 STRATEGY=copy

    log "2/3 ${COMPRESS_AFTER_DAYS}일 초과 .tar gzip 압축"
    kubectl -n "$NS" exec "$DEPLOY" -- sh -c "
      find ${BACKUP_DIR} -maxdepth 1 -type f \
        -name '*_gitlab_backup.tar' \
        -mtime +${COMPRESS_AFTER_DAYS} \
        -print -exec gzip -1 {} \;
    "

    log "3/3 ${RETENTION_DAYS}일 초과 .tar.gz 삭제"
    kubectl -n "$NS" exec "$DEPLOY" -- sh -c "
      find ${BACKUP_DIR} -maxdepth 1 -type f \
        -name '*_gitlab_backup.tar.gz' \
        -mtime +${RETENTION_DAYS} \
        -print -delete
    "

    log "현재 백업 디렉토리 상태"
    kubectl -n "$NS" exec "$DEPLOY" -- ls -lh "$BACKUP_DIR"

    log "DONE"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitlab-backup
  namespace: cicd
  labels:
    workload: cicd
    app: gitlab
spec:
  # 분기 1회 (1/1, 4/1, 7/1, 10/1) 03:00 KST
  schedule: "0 3 1 1,4,7,10 *"
  timeZone: Asia/Seoul
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            workload: cicd
            app: gitlab-backup
        spec:
          serviceAccountName: gitlab-backup
          restartPolicy: Never
          containers:
            - name: kubectl
              image: alpine/k8s:1.33.8
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/run.sh"]
              resources:
                requests: { cpu: "50m",  memory: "64Mi" }
                limits:   { cpu: "500m", memory: "256Mi" }
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: gitlab-backup-script
                defaultMode: 0755
