# Bitnami Metrics Server - 최소 설정 (OpenLens 모니터링용)
# 현재 클러스터: 7개 노드, 28개 Pod

# 복제본 수
replicaCount: 1

# Metrics Server 핵심 설정
extraArgs:
  - --kubelet-insecure-tls=true
  - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
  - --kubelet-use-node-status-port=true
  - --metric-resolution=15s

# 리소스 설정 (현재 클러스터 규모에 최적화)
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 300m
    memory: 400Mi

# 우선순위 클래스 (시스템 중요 Pod)
priorityClassName: "system-cluster-critical"

# 마스터 노드 선호 배치
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
    - weight: 80
      preference:
        matchExpressions:
        - key: node-role.kubernetes.io/master
          operator: Exists

# 노드 장애 시 빠른 복구
tolerations:
- key: node.kubernetes.io/not-ready
  operator: Exists
  effect: NoExecute
  tolerationSeconds: 30
- key: node.kubernetes.io/unreachable
  operator: Exists
  effect: NoExecute
  tolerationSeconds: 30

# 무중단 업데이트
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0

# 헬스체크 설정
livenessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10

# API 서비스 설정
apiService:
  create: true
  insecureSkipTLSVerify: true

