apiVersion: apps/v1
kind: Deployment
metadata:
  name: orkis-stage-redis
  namespace: orkis
  labels:
    app: orkis-stage-redis
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  replicas: 1
  selector:
    matchLabels:
      app: orkis-stage-redis
  template:
    metadata:
      labels:
        app: orkis-stage-redis
    spec:
      nodeSelector:
        app: orkis-database
      containers:
        - name: orkis-stage-redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
