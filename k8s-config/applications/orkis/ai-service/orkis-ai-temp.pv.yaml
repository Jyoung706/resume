apiVersion: v1
kind: PersistentVolume
metadata:
  name: orkis-ai-temp-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/orkis-ai-temp
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app
              operator: In
              values:
                - orkis-ai
  claimRef:
    namespace: orkis
    name: orkis-ai-temp-pvc
