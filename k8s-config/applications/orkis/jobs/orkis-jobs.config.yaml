apiVersion: v1
kind: ConfigMap
metadata:
  name: orkis-node-jobs-config
  namespace: orkis
data:
  ORKIS_DI_MODE: "new"
  # Redis Configuration
  REDIS_HOST: "orkis-chat-redis"
  REDIS_PORT: "36379"

  REDIS_STAGE_HOST: "orkis-stage-redis"
  REDIS_STAGE_PORT: "36378"

  POSTGRES_HOST: "orkis-postgres-svc"

  # Job Configuration
  # 체크 주기 (초 단위, 기본: 10초)
  SESSION_CHECK_INTERVAL_SECONDS: "10"

  # 세션 타임아웃 시간 (분 단위, 기본: 60분)
  SESSION_TIMEOUT_MINUTES: "60"

  # 데이터 아카이브 설정
  # 아카이브 작업 주기 (초 단위, 기본: 10초)
  DATA_ARCHIVE_INTERVAL_SECONDS: "10"

  # 아카이브 디렉토리 경로 (기본: 현재 디렉토리의 'archive' 폴더)
  DATA_ARCHIVE_DIR_PATH: "data-archive"

  # 시작 시 아카이브 즉시 실행 여부
  RUN_ARCHIVE_ON_STARTUP: "true"

  # 시작 시 즉시 실행 여부
  RUN_ON_STARTUP: "true"

  # 환경 설정
  NODE_ENV: production

  PORT: "8000"

  # user_info question_count 컬럼 업데이트 할 정수
  USER_QUESTION_COUNT: "50"

  # SCAN 배치 크기 (키 스캔 시 한 번에 처리할 키 개수)
  REDIS_SCAN_BATCH_SIZE: "1000"

  # Pipeline 배치 크기 (한 번에 Pipeline으로 처리할 명령어 개수)
  REDIS_PIPELINE_BATCH_SIZE: "100"

  # 삭제 배치 크기 (한 번에 삭제할 키 개수)
  REDIS_DELETE_BATCH_SIZE: "50"

  # 동시 세션 처리 개수 (병렬 처리 시 동시 실행할 세션 개수)
  REDIS_CONCURRENT_SESSIONS: "5"

  # SCAN + Pipeline 최적화 활성화 (true/false)
  ENABLE_REDIS_OPTIMIZATION: "true"

  # 성능 메트릭 로깅 활성화 (true/false)
  ENABLE_PERFORMANCE_METRICS: "true"

  # 배치 작업 로깅 활성화 (true/false)
  LOG_BATCH_OPERATIONS: "false"

  ARCHIVE_RECOVERY_AGE_THRESHOLD_MS: "1800000"

  # AI Server Health Check (docs/2026-05-26/jobs-healthcheck-plan.md)
  # 코드: apps/orkis-jobs/src/main/health/AiServerPingClient.ts
  # ping 주기 (초 단위)
  AI_HEALTH_CHECK_INTERVAL_SECONDS: "30"
  # 단일 ping 타임아웃 (밀리초)
  AI_HEALTH_CHECK_TIMEOUT_MS: "2000"
  # Pod 부팅 직후 즉시 1회 ping 실행 여부
  AI_HEALTH_RUN_ON_STARTUP: "true"
