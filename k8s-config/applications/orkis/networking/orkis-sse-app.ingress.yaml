# orkis.kr SSE 경로 - Ingress에서 직접 backend로 라우팅
# Cookie 기반 Sticky Session + 경로 Rewrite (/api/sse/* → /sse/*)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orkis-sse-app-ingress
  namespace: orkis
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    # 경로 Rewrite: /api/sse/xxx → /sse/xxx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /sse/$2
    # Cookie 기반 Sticky Session
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "ORKIS_SSE_AFFINITY"
    nginx.ingress.kubernetes.io/session-cookie-expires: "86400"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "86400"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    # SSE를 위한 버퍼링 비활성화
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - orkis.kr
      secretName: orkis-tls
  rules:
    - host: orkis.kr
      http:
        paths:
          - path: /api/sse(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: orkis-backend
                port:
                  number: 80
